<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>바리온 음향 진동 (BAO) 시각화</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        
        body {
            background-color: #0B0F19;
            color: #E2E8F0;
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            height: 100vh;
            box-sizing: border-box;
            overflow: hidden;
        }
        header {
            text-align: center;
            margin-bottom: 15px;
            flex-shrink: 0;
        }
        h1 {
            margin: 0;
            font-size: 28px;
            color: #fff;
            text-shadow: 0 0 15px rgba(255,255,255,0.2);
            font-weight: 800;
        }
        p.subtitle {
            margin: 5px 0 0 0;
            color: #9CA3AF;
            font-size: 14px;
        }
        .grid-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            gap: 20px;
            flex: 1;
            min-height: 0;
        }
        .panel {
            background: #111827;
            border-radius: 16px;
            border: 1px solid #1F2937;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .right-col {
            grid-row: span 2;
        }
        .panel-title {
            position: absolute;
            top: 15px;
            left: 20px;
            font-size: 15px;
            font-weight: 600;
            color: #D1D5DB;
            z-index: 10;
            background: rgba(17, 24, 39, 0.8);
            padding: 4px 8px;
            border-radius: 6px;
        }
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
        }
        .controls {
            margin-top: 20px;
            background: #111827;
            padding: 15px 30px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 1px solid #1F2937;
            flex-shrink: 0;
        }
        .btn-group {
            display: flex;
            gap: 10px;
        }
        button {
            background: #3B82F6;
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.2s;
            box-shadow: 0 4px 6px rgba(59, 130, 246, 0.3);
        }
        button:hover {
            background: #2563EB;
            transform: translateY(-1px);
        }
        button.secondary {
            background: #4B5563;
            box-shadow: 0 4px 6px rgba(75, 85, 99, 0.3);
        }
        button.secondary:hover {
            background: #374151;
        }
        .slider-container {
            flex: 1;
            margin: 0 40px;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .slider-container label {
            font-weight: 600;
            color: #9CA3AF;
            white-space: nowrap;
        }
        input[type=range] {
            flex: 1;
            accent-color: #3B82F6;
            cursor: pointer;
        }
        .time-display {
            font-variant-numeric: tabular-nums;
            font-weight: 800;
            color: #FCD34D;
            width: 120px;
            text-align: right;
            font-size: 16px;
        }
        @media (max-width: 768px) {
            body {
                height: auto;
                overflow: auto;
                padding: 10px;
            }
            .grid-container {
                grid-template-columns: 1fr;
                grid-template-rows: auto;
            }
            .panel {
                min-height: 350px;
                height: 350px;
            }
            .right-col {
                grid-row: auto;
            }
            .controls {
                flex-direction: column;
                align-items: stretch;
                padding: 15px;
            }
            .btn-group {
                flex-direction: column;
                width: 100%;
            }
            button {
                width: 100%;
                margin-bottom: 5px;
            }
            .slider-container {
                margin: 10px 0 0 0;
                width: 100%;
                flex-direction: column;
                align-items: stretch;
            }
            .slider-container label {
                margin-bottom: 5px;
                text-align: center;
            }
            .time-display {
                width: 100%;
                text-align: center;
                margin-top: 10px;
            }
            header h1 {
                font-size: 22px;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>바리온 음향 진동 (BAO) 및 CMB 파워 스펙트럼</h1>
        <p class="subtitle">초기 우주 가스 구름의 크기에 따른 진동 속도 차이가 우주 배경 복사(CMB)에 남긴 흔적을 관찰해보세요.</p>
    </header>

    <div class="grid-container">
        <div class="panel">
            <div class="panel-title">1. 초기 우주 가스 구름 (영역 크기 비교)</div>
            <canvas id="cloudsCanvas"></canvas>
        </div>
        <div class="panel right-col">
            <div class="panel-title">3. CMB 파워 스펙트럼 (온도 요동)</div>
            <canvas id="spectrumCanvas"></canvas>
        </div>
        <div class="panel">
            <div class="panel-title">2. 시간에 따른 밀도 변화 (수축과 팽창)</div>
            <canvas id="densityCanvas"></canvas>
        </div>
    </div>

    <div class="controls">
        <div class="btn-group">
            <button id="playBtn">재생 / 일시정지</button>
            <button id="resetBtn" class="secondary">초기화</button>
            <button id="jumpBtn" class="secondary">재결합 시기로 이동 (38만년)</button>
        </div>
        <div class="slider-container">
            <label for="timeSlider">우주 나이:</label>
            <input type="range" id="timeSlider" min="0" max="500" value="0" step="1">
            <div class="time-display" id="timeDisplay">0 년</div>
        </div>
    </div>

    <script>
        const cloudsCanvas = document.getElementById('cloudsCanvas');
        const densityCanvas = document.getElementById('densityCanvas');
        const spectrumCanvas = document.getElementById('spectrumCanvas');
        const timeSlider = document.getElementById('timeSlider');
        const timeDisplay = document.getElementById('timeDisplay');
        const playBtn = document.getElementById('playBtn');
        const resetBtn = document.getElementById('resetBtn');
        const jumpBtn = document.getElementById('jumpBtn');

        const ctxClouds = cloudsCanvas.getContext('2d');
        const ctxDensity = densityCanvas.getContext('2d');
        const ctxSpectrum = spectrumCanvas.getContext('2d');

        let time = 0;
        const T_REC = 380;
        const MAX_TIME = 500;
        let isPlaying = false;
        let animationId;

        // 동적 크기 조정 도우미
        function checkResize(canvas) {
            const cw = Math.max(1, canvas.clientWidth);
            const ch = Math.max(1, canvas.clientHeight);
            if (canvas.width !== cw || canvas.height !== ch) {
                canvas.width = cw;
                canvas.height = ch;
            }
        }

        window.addEventListener('resize', () => { draw(); });

        const modes = [
            { l: 1, color: '#FF3366', name: '큰 영역', desc: '제1피크 (최대 수축)' },
            { l: 2, color: '#33CCFF', name: '중간 영역', desc: '제2피크 (최대 팽창)' },
            { l: 3, color: '#33FF99', name: '작은 영역', desc: '제3피크 (최대 수축)' }
        ];

        // Math helpers
        function getPhase(t, l) {
            return 2 * Math.PI * t * l / 760;
        }
        function getDensity(t, l) {
            return -Math.cos(getPhase(t, l));
        }
        function getEnvelope(l) {
            return 3.0 * l * Math.exp(-0.8 * l);
        }

        function draw() {
            checkResize(cloudsCanvas);
            checkResize(densityCanvas);
            checkResize(spectrumCanvas);
            
            timeDisplay.textContent = (time / 10).toFixed(1) + ' 만년';
            timeSlider.value = time;
            
            drawClouds();
            drawDensity();
            drawSpectrum();
        }

        function drawClouds() {
            const w = cloudsCanvas.width;
            const h = cloudsCanvas.height;
            ctxClouds.clearRect(0, 0, w, h);
            
            const gap = w / 4;
            
            modes.forEach((mode, i) => {
                const cx = gap * (i + 1);
                const cy = h / 2 - 10;
                
                const baseR = 60 / Math.sqrt(mode.l);
                const deltaR = baseR * 0.4;
                
                const density = getDensity(time, mode.l); // -1 to 1
                const r = baseR - deltaR * density; // if density=1 (compression), r is small
                
                ctxClouds.shadowBlur = 20 + 15 * density; // glow more when compressed
                ctxClouds.shadowColor = mode.color;
                
                ctxClouds.beginPath();
                ctxClouds.arc(cx, cy, Math.max(2, r), 0, Math.PI * 2);
                ctxClouds.fillStyle = mode.color;
                ctxClouds.globalAlpha = 0.6 + 0.3 * density;
                ctxClouds.fill();
                ctxClouds.globalAlpha = 1.0;
                
                ctxClouds.lineWidth = 2;
                ctxClouds.strokeStyle = '#fff';
                ctxClouds.stroke();
                
                ctxClouds.shadowBlur = 0;
                
                ctxClouds.fillStyle = '#fff';
                ctxClouds.font = 'bold 14px Inter';
                ctxClouds.textAlign = 'center';
                ctxClouds.fillText(mode.name, cx, h - 35);
                ctxClouds.fillStyle = '#9CA3AF';
                ctxClouds.font = '12px Inter';
                ctxClouds.fillText(mode.desc, cx, h - 15);
            });
        }

        function drawDensity() {
            const w = densityCanvas.width;
            const h = densityCanvas.height;
            ctxDensity.clearRect(0, 0, w, h);
            
            const marginX = 60;
            const marginY = 40;
            const plotW = w - marginX * 2;
            const plotH = h - marginY * 2;
            
            // Axes
            ctxDensity.strokeStyle = '#374151';
            ctxDensity.lineWidth = 1;
            
            // 0 line
            ctxDensity.beginPath();
            ctxDensity.moveTo(marginX, h/2);
            ctxDensity.lineTo(w - marginX, h/2);
            ctxDensity.stroke();
            
            // Y axis
            ctxDensity.beginPath();
            ctxDensity.moveTo(marginX, marginY);
            ctxDensity.lineTo(marginX, h - marginY);
            ctxDensity.stroke();
            
            // Y labels
            ctxDensity.fillStyle = '#9CA3AF';
            ctxDensity.font = '12px Inter';
            ctxDensity.textAlign = 'right';
            ctxDensity.fillText('최대 팽창', marginX - 10, marginY + 5);
            ctxDensity.fillText('최대 수축', marginX - 10, h - marginY + 5);
            
            // T_REC line
            const xRec = marginX + (T_REC / MAX_TIME) * plotW;
            ctxDensity.strokeStyle = '#FCD34D';
            ctxDensity.setLineDash([5, 5]);
            ctxDensity.beginPath();
            ctxDensity.moveTo(xRec, marginY);
            ctxDensity.lineTo(xRec, h - marginY);
            ctxDensity.stroke();
            ctxDensity.setLineDash([]);
            ctxDensity.fillStyle = '#FCD34D';
            ctxDensity.textAlign = 'left';
            ctxDensity.fillText('재결합 시기 (38만년)', xRec + 10, marginY + 10);
            
            // Lines
            modes.forEach(mode => {
                ctxDensity.strokeStyle = mode.color;
                ctxDensity.lineWidth = 2.5;
                ctxDensity.beginPath();
                
                for(let t = 0; t <= time; t += 2) {
                    const x = marginX + (t / MAX_TIME) * plotW;
                    const yVal = getDensity(t, mode.l); 
                    const y = h/2 + yVal * (plotH / 2); // 반대 방향으로 변경 (수축이 아래)
                    
                    if (t === 0) ctxDensity.moveTo(x, y);
                    else ctxDensity.lineTo(x, y);
                }
                ctxDensity.stroke();
                
                // Dot
                const currX = marginX + (time / MAX_TIME) * plotW;
                const currY = h/2 + getDensity(time, mode.l) * (plotH / 2); // 반대 방향으로 변경
                ctxDensity.fillStyle = '#fff';
                ctxDensity.beginPath();
                ctxDensity.arc(currX, currY, 5, 0, Math.PI*2);
                ctxDensity.fill();
            });
        }

        function drawSpectrum() {
            const w = spectrumCanvas.width;
            const h = spectrumCanvas.height;
            ctxSpectrum.clearRect(0, 0, w, h);
            
            const marginX = 60;
            const marginY = 50;
            const plotW = w - marginX * 2;
            const plotH = h - marginY * 2;
            
            const maxL = 4;
            const maxE = 1.5; 
            
            // Axes
            ctxSpectrum.strokeStyle = '#374151';
            ctxSpectrum.lineWidth = 1;
            ctxSpectrum.beginPath();
            ctxSpectrum.moveTo(marginX, h - marginY);
            ctxSpectrum.lineTo(w - marginX, h - marginY);
            ctxSpectrum.stroke();
            ctxSpectrum.moveTo(marginX, marginY);
            ctxSpectrum.lineTo(marginX, h - marginY);
            ctxSpectrum.stroke();
            
            // Labels
            ctxSpectrum.fillStyle = '#9CA3AF';
            ctxSpectrum.font = '12px Inter';
            ctxSpectrum.textAlign = 'center';
            ctxSpectrum.fillText('Multipole l ( ← 큰 영역 스케일 / 작은 영역 스케일 → )', w/2, h - 20);
            ctxSpectrum.save();
            ctxSpectrum.translate(25, h/2);
            ctxSpectrum.rotate(-Math.PI/2);
            ctxSpectrum.fillText('온도 요동 세기 (ΔT²)', 0, 0);
            ctxSpectrum.restore();
            
            // T_REC marker text
            if (Math.abs(time - T_REC) < 2) {
                ctxSpectrum.fillStyle = '#FCD34D';
                ctxSpectrum.font = 'bold 18px Inter';
                ctxSpectrum.textAlign = 'right';
                ctxSpectrum.fillText('우주 배경 복사 방출!', w - marginX, marginY + 10);
            }
            
            // 1. Static CMB curve
            ctxSpectrum.strokeStyle = 'rgba(255, 255, 255, 0.15)';
            ctxSpectrum.lineWidth = 2;
            ctxSpectrum.setLineDash([4, 4]);
            ctxSpectrum.beginPath();
            for (let l = 0; l <= maxL; l += 0.05) {
                const p = getEnvelope(l) * Math.pow(Math.cos(Math.PI * l), 2);
                const x = marginX + (l / maxL) * plotW;
                const y = (h - marginY) - (p / maxE) * plotH;
                if (l === 0) ctxSpectrum.moveTo(x, y);
                else ctxSpectrum.lineTo(x, y);
            }
            ctxSpectrum.stroke();
            ctxSpectrum.setLineDash([]);
            
            // 2. Dynamic curve
            ctxSpectrum.strokeStyle = 'rgba(255, 255, 255, 0.6)';
            ctxSpectrum.lineWidth = 3;
            ctxSpectrum.shadowBlur = 10;
            ctxSpectrum.shadowColor = 'rgba(255,255,255,0.5)';
            ctxSpectrum.beginPath();
            for (let l = 0; l <= maxL; l += 0.05) {
                const p = getEnvelope(l) * Math.pow(Math.cos(getPhase(time, l)), 2);
                const x = marginX + (l / maxL) * plotW;
                const y = (h - marginY) - (p / maxE) * plotH;
                if (l === 0) ctxSpectrum.moveTo(x, y);
                else ctxSpectrum.lineTo(x, y);
            }
            ctxSpectrum.stroke();
            ctxSpectrum.shadowBlur = 0;
            
            // 3. Dots
            modes.forEach(mode => {
                const p = getEnvelope(mode.l) * Math.pow(Math.cos(getPhase(time, mode.l)), 2);
                const x = marginX + (mode.l / maxL) * plotW;
                const y = (h - marginY) - (p / maxE) * plotH;
                
                ctxSpectrum.shadowBlur = 15;
                ctxSpectrum.shadowColor = mode.color;
                ctxSpectrum.fillStyle = mode.color;
                ctxSpectrum.beginPath();
                ctxSpectrum.arc(x, y, 7, 0, Math.PI*2);
                ctxSpectrum.fill();
                
                ctxSpectrum.shadowBlur = 0;
                ctxSpectrum.strokeStyle = mode.color;
                ctxSpectrum.lineWidth = 2;
                ctxSpectrum.globalAlpha = 0.5;
                ctxSpectrum.beginPath();
                ctxSpectrum.moveTo(x, y);
                ctxSpectrum.lineTo(x, h - marginY);
                ctxSpectrum.stroke();
                ctxSpectrum.globalAlpha = 1.0;
            });
        }

        function animate() {
            if (isPlaying) {
                time += 1.0;
                if (time > MAX_TIME) time = 0;
                
                // 재결합 시기(380 -> 38.0만년)에 도달하면 자동 일시 정지
                if (Math.abs(time - T_REC) < 0.6) {
                    time = T_REC;
                    isPlaying = false;
                }
                
                draw();
            }
            animationId = requestAnimationFrame(animate);
        }

        // Event Listeners
        playBtn.addEventListener('click', () => {
            isPlaying = !isPlaying;
        });

        resetBtn.addEventListener('click', () => {
            time = 0;
            isPlaying = false;
            draw();
        });

        jumpBtn.addEventListener('click', () => {
            time = T_REC;
            isPlaying = false;
            draw();
        });

        timeSlider.addEventListener('input', (e) => {
            time = parseFloat(e.target.value);
            isPlaying = false;
            draw();
        });
        
        timeSlider.addEventListener('change', (e) => {
            time = parseFloat(e.target.value);
            isPlaying = false;
            draw();
        });

        // Init
        draw();
        animate();

    </script>
</body>
</html>
